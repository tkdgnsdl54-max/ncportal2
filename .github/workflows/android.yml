name: Build APK

# 푸시/태그/수동 실행 시 클라우드에서 APK를 빌드한다.
# - main(또는 master) 푸시: 디버그 APK를 아티팩트로 업로드
# - vX.Y.Z 태그 푸시: 위 APK를 GitHub Release에 첨부 (Obtainium 등으로 자동 업데이트 추적 가능)
on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write   # 태그 빌드에서 Release 생성에 필요

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # 안정적 서명: repo에 커밋된 debug.keystore가 있으면 그것으로 서명한다.
      # (없으면 러너가 매번 새 키를 만들어 서명이 달라져 업데이트 설치가 안 됨)
      # debug.keystore는 "Bootstrap signing keystore" 워크플로를 한 번 실행하면 생성·커밋된다.
      - name: Use committed debug keystore (stable signature)
        run: |
          if [ -f debug.keystore ]; then
            mkdir -p ~/.android
            cp debug.keystore ~/.android/debug.keystore
            echo "고정 debug.keystore로 서명합니다."
          else
            echo "::warning::debug.keystore가 없습니다. 러너 기본 키로 서명되어 업데이트 호환성이 없습니다. 먼저 'Bootstrap signing keystore' 워크플로를 실행하세요."
          fi

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ncportal-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Publish Release (tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
