name: Build APK

# 푸시/태그/수동 실행 시 클라우드에서 APK를 빌드한다.
# - main(또는 master) 푸시: 디버그 APK를 아티팩트로 업로드
# - vX.Y.Z 태그 푸시: 위 APK를 GitHub Release에 첨부 (Obtainium 등으로 자동 업데이트 추적 가능)
#
# 서명: build.gradle.kts가 repo 루트의 debug.keystore를 직접 참조하므로
# CI가 키스토어를 복사할 필요 없이 항상 동일한 인증서로 서명됩니다.
on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write   # 태그 빌드에서 Release 생성에 필요

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ncportal-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Publish Release (tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
