name: Bootstrap signing keystore

# 한 번만 수동 실행(Actions 탭 → 이 워크플로 → Run workflow)하면,
# 고정 debug.keystore를 생성해 repo에 커밋한다. 이후 모든 빌드가 같은 키로 서명되어
# 새 APK가 기존 설치 위에 "업데이트"로 깔린다(Obtainium 자동 업데이트의 전제).
# 비밀번호/별칭은 Android 표준 디버그 키 값(android / androiddebugkey)이라 비밀이 아니다.
on:
  workflow_dispatch:

permissions:
  contents: write   # 생성한 keystore를 repo에 push 하기 위해 필요

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Generate debug.keystore (skip if it already exists)
        run: |
          if [ -f debug.keystore ]; then
            echo "debug.keystore가 이미 있습니다 — 생성하지 않습니다."
            exit 0
          fi
          keytool -genkeypair -v \
            -keystore debug.keystore \
            -storepass android -keypass android \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
          echo "debug.keystore 생성 완료."

      - name: Commit & push keystore
        run: |
          if git ls-files --error-unmatch debug.keystore >/dev/null 2>&1; then
            echo "이미 추적 중 — 커밋할 변경 없음."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f debug.keystore
          git commit -m "Add fixed debug.keystore for stable app signing"
          git push
